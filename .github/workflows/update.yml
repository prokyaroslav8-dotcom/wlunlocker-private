name: Auto Update Private Subscription
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-keys:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Чеккаут репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Установка зависимостей и Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Запуск парсера
        run: python update_private.py

      - name: Пуш изменений в privateWLunlocker.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add privateWLunlocker.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update privateWLunlocker.txt" && git push)
